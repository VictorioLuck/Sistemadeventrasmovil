<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f97316">
    <title>Sistema de Ventas Móvil - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body { 
            background: #f8fafc;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .header {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            padding: 16px 20px;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 10px 30px -5px rgba(249, 115, 22, 0.3);
        }
        .card {
            background: white;
            border-radius: 20px;
            margin: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        .stat-alert::after { background: linear-gradient(90deg, #ef4444, #f87171); }
        .stat-ok::after { background: linear-gradient(90deg, #0ea5e9, #38bdf8); }
        .stat-card .label {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            margin-top: 4px;
        }
        .search-input {
            width: 100%;
            height: 48px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 0 16px 0 44px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .search-input:focus {
            outline: none;
            border-color: #f97316;
            background: white;
        }
        .product-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: all 0.2s ease;
        }
        .product-card:active {
            transform: scale(0.98);
        }
        .stock-low { 
            border-left: 5px solid #ef4444; 
            background: linear-gradient(145deg, #fef2f2 0%, #fff 100%);
        }
        .stock-ok { 
            border-left: 5px solid #10b981; 
        }
        .btn-primary {
            height: 56px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 8px 20px -5px rgba(249, 115, 22, 0.4);
            transition: all 0.15s ease;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            height: 48px;
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:active {
            transform: scale(0.98);
        }
        .btn-import {
            height: 48px;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            color: #475569;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-import:active {
            background: #e2e8f0;
        }
        .btn-stock {
            background: #dbeafe;
            color: #2563eb;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-stock:active {
            background: #bfdbfe;
        }
        .btn-qr {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
            transition: all 0.15s ease;
        }
        .btn-qr:active {
            transform: scale(0.95);
        }
        .input-field {
            width: 100%;
            height: 56px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .input-field:focus {
            outline: none;
            border-color: #f97316;
            background: white;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            font-style: italic;
            margin-bottom: 20px;
            color: #1f2937;
        }
        .btn-modal {
            height: 48px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn-modal:active {
            transform: scale(0.98);
        }
        .btn-modal-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
        }
        .btn-modal-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .btn-modal-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        .btn-modal-gray {
            background: #f3f4f6;
            color: #6b7280;
        }
        .stock-number {
            font-size: 24px;
            font-weight: 800;
            min-width: 40px;
            text-align: center;
        }
        #qrcode canvas, #qrcode img { 
            margin: 0 auto; 
            border: 8px solid white; 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyCardcjcK8SeU6TtC0FSZ3RfLKXlXlu4kE",

            storageBucket: "sistema-vetas-moviles.appspot.com",

        if (!firebase.apps.length) {

            // Si es el admin, no hacemos nada y dejamos que la página cargue normalmente.
            }

</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="flex justify-between items-center">
            <button onclick="window.location.href='screen_administrador.html'" class="text-white font-bold flex items-center gap-2 text-sm bg-white/20 px-4 py-2 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Volver
            </button>
            <h1 class="text-xl font-black text-white uppercase italic">Inventario</h1>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3 mx-4 mt-4">
        <div class="stat-card stat-alert">
            <p class="label">Items en Alerta</p>
            <p id="alertCount" class="value text-red-500">0</p>
        </div>
        <div class="stat-card stat-ok">
            <p class="label">Total Productos</p>
            <p id="totalItems" class="value text-sky-600">0</p>
        </div>
    </div>

    <!-- Buscador -->
    <div class="mx-4 mt-4">
        <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="buscador" placeholder="Buscar producto..." class="search-input" oninput="renderizarInventario()">
        </div>
    </div>

    <!-- Botón Agregar -->
    <div class="mx-4 mt-4">
        <button onclick="abrirModalGestion()" class="btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Agregar Producto
        </button>
    </div>

    <!-- Export/Import -->
    <div class="grid grid-cols-2 gap-3 mx-4 mt-3">
        <button onclick="exportarInventario()" class="btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Exportar
        </button>
        <label class="btn-import">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            Importar
            <input type="file" id="inputImportar" class="hidden" accept=".json" onchange="importarInventario(event)">
        </label>
    </div>

    <!-- Lista -->
    <div class="mx-4 mt-4 pb-8" id="lista-inventario"></div>

    <!-- Modal QR -->
    <div id="modalQR" class="modal-overlay">
        <div class="modal-content text-center">
            <h3 id="qrNombre" class="modal-title">NOMBRE</h3>
            <div id="qrcode" class="mb-6"></div>

            <button onclick="descargarQR()" class="btn-modal btn-modal-success mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Descargar QR
            </button>
            <button onclick="cerrarModal('modalQR')" class="btn-modal btn-modal-gray">Cerrar</button>
        </div>
    </div>

    <!-- Modal Stock -->
    <div id="modalStock" class="modal-overlay">
        <div class="modal-content">
            <h3 class="font-bold text-lg text-gray-800 mb-1">Ajustar Existencias</h3>
            <p id="modalProductoNombre" class="text-sm text-gray-500 mb-4 font-semibold"></p>

            <input type="number" id="stock-cantidad" class="input-field text-center text-xl font-bold mb-4" placeholder="Cantidad">

            <div class="grid grid-cols-2 gap-3 mb-3">
                <button onclick="procesarAjuste('entrada')" class="btn-modal btn-modal-success">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Entrada
                </button>
                <button onclick="procesarAjuste('salida')" class="btn-modal btn-modal-danger">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" />
                    </svg>
                    Pérdida
                </button>
            </div>
            <button onclick="cerrarModal('modalStock')" class="btn-modal btn-modal-gray">Cancelar</button>
        </div>
    </div>

    <!-- Modal Gestión -->
    <div id="modalGestion" class="modal-overlay">
        <div class="modal-content">
            <h3 id="gestionTitulo" class="modal-title">Nuevo Producto</h3>

            <div class="space-y-4 mb-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Nombre</label>
                    <input type="text" id="gest-nombre" placeholder="Nombre del producto" class="input-field uppercase">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Precio ($)</label>
                    <input type="number" step="0.01" id="gest-precio" placeholder="0.00" class="input-field">
                </div>
            </div>

            <button onclick="guardarProducto()" class="btn-modal btn-modal-primary mb-2">Guardar</button>
            <button id="btnEliminar" onclick="eliminarProducto()" class="btn-modal btn-modal-danger mb-2 hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                Eliminar
            </button>
            <button onclick="cerrarModal('modalGestion')" class="btn-modal btn-modal-gray">Cancelar</button>
        </div>
    </div>

    <script>
        let menu = JSON.parse(localStorage.getItem('menu_comida')) || [];
        let indexEditando = null;

        function exportarInventario() {
            if (menu.length === 0) return alert("Inventario vacío");
            const blob = new Blob([JSON.stringify(menu, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `inventario_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importarInventario(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    menu = JSON.parse(event.target.result);
                    actualizarLocalStorage();
                    alert("Inventario importado correctamente");
                } catch (err) {
                    alert("Error al importar archivo");
                }
            };
            reader.readAsText(e.target.files[0]);
        }

        function abrirQR(index) {
            indexEditando = index;
            const prod = menu[index];
            document.getElementById('qrNombre').innerText = prod.nombre;
            const contenedor = document.getElementById('qrcode');
            contenedor.innerHTML = "";

            new QRCode(contenedor, {
                text: `PRODUCTO: ${prod.nombre} | PRECIO: $${prod.precio.toFixed(2)}`,
                width: 200,
                height: 200,
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('modalQR').classList.add('show');
        }

        function descargarQR() {
            const nombreProd = menu[indexEditando].nombre.replace(/\s+/g, '_').toLowerCase();
            const canvas = document.querySelector('#qrcode canvas');

            if (canvas) {
                const link = document.createElement('a');
                link.download = `qr_${nombreProd}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } else {
                const img = document.querySelector('#qrcode img');
                const link = document.createElement('a');
                link.download = `qr_${nombreProd}.png`;
                link.href = img.src;
                link.click();
            }
        }

        function renderizarInventario() {
            const contenedor = document.getElementById('lista-inventario');
            const filtro = document.getElementById('buscador').value.toLowerCase();
            let alertas = 0;
            contenedor.innerHTML = "";

            menu.forEach((prod, index) => {
                if (!prod.nombre.toLowerCase().includes(filtro)) return;
                const stock = prod.stock || 0;
                if (stock < 10) alertas++;

                const div = document.createElement('div');
                div.className = `product-card ${stock < 10 ? 'stock-low' : 'stock-ok'}`;
                div.innerHTML = `
                    <div onclick="abrirModalGestion(${index})" class="flex-1 cursor-pointer overflow-hidden">
                        <h3 class="font-black text-gray-800 uppercase truncate text-base">${prod.nombre}</h3>
                        <p class="text-xs text-gray-500 font-bold">$${prod.precio.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="abrirQR(${index})" class="btn-qr">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                            </svg>
                        </button>
                        <div class="text-right">
                            <p class="stock-number ${stock < 10 ? 'text-red-500' : 'text-emerald-600'}">${stock}</p>
                        </div>
                        <button onclick="abrirModalStock(${index})" class="btn-stock">STOCK</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });

            document.getElementById('alertCount').innerText = alertas;
            document.getElementById('totalItems').innerText = menu.length;
        }

        function abrirModalStock(i) { 
            indexEditando = i; 
            document.getElementById('modalProductoNombre').innerText = menu[i].nombre; 
            document.getElementById('stock-cantidad').value = '';
            document.getElementById('modalStock').classList.add('show');
            setTimeout(() => document.getElementById('stock-cantidad').focus(), 100);
        }

        function procesarAjuste(t) { 
            const c = parseInt(document.getElementById('stock-cantidad').value);
            if(isNaN(c) || c <= 0) return alert("Ingrese una cantidad válida");
            menu[indexEditando].stock = (menu[indexEditando].stock || 0) + (t === 'entrada' ? c : -c);
            if(menu[indexEditando].stock < 0) menu[indexEditando].stock = 0;
            actualizarLocalStorage(); 
            cerrarModal('modalStock');
        }

        function abrirModalGestion(i = null) {
            indexEditando = i;
            if(i !== null) {
                document.getElementById('gestionTitulo').innerText = "Editar Producto";
                document.getElementById('gest-nombre').value = menu[i].nombre;
                document.getElementById('gest-precio').value = menu[i].precio;
                document.getElementById('btnEliminar').classList.remove('hidden');
            } else {
                document.getElementById('gestionTitulo').innerText = "Nuevo Producto";
                document.getElementById('gest-nombre').value = ""; 
                document.getElementById('gest-precio').value = "";
                document.getElementById('btnEliminar').classList.add('hidden');
            }
            document.getElementById('modalGestion').classList.add('show');
            setTimeout(() => document.getElementById('gest-nombre').focus(), 100);
        }

        function guardarProducto() {
            const n = document.getElementById('gest-nombre').value.toUpperCase().trim();
            const p = parseFloat(document.getElementById('gest-precio').value);
            if(!n) return alert("Ingrese un nombre");
            if(isNaN(p) || p < 0) return alert("Ingrese un precio válido");

            if(indexEditando !== null) { 
                menu[indexEditando].nombre = n; 
                menu[indexEditando].precio = p; 
            } else { 
                menu.push({nombre: n, precio: p, stock: 0}); 
            }
            actualizarLocalStorage(); 
            cerrarModal('modalGestion');
        }

        function eliminarProducto() { 
            if(confirm("¿Eliminar este producto permanentemente?")) { 
                menu.splice(indexEditando, 1); 
                actualizarLocalStorage(); 
                cerrarModal('modalGestion'); 
            } 
        }

        function cerrarModal(id) { 
            document.getElementById(id).classList.remove('show'); 
        }

        function actualizarLocalStorage() { 
            localStorage.setItem('menu_comida', JSON.stringify(menu)); 
            renderizarInventario(); 
        }

        // Cerrar modal al hacer clic fuera
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('show');
            });
        });

        renderizarInventario();
    </script>
</body>
</html>
