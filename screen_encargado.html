<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f97316">
    <title>Sistema de Ventas Móvil - Punto de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body { 
            background: #f8fafc;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header-tasa {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            padding: 16px 20px;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 10px 30px -5px rgba(14, 165, 233, 0.3);
        }
        .tasa-input {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 8px 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            width: 100px;
            text-align: center;
            -webkit-appearance: none;
        }
        .tasa-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
        }
        .card {
            background: white;
            border-radius: 20px;
            margin: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .btn-producto { 
            background: white;
            border: 2px solid #fed7aa;
            border-radius: 16px;
            padding: 16px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.15s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(249, 115, 22, 0.2);
        }
        .btn-producto:active { 
            background: #f97316;
            border-color: #f97316;
            color: white;
            transform: scale(0.97);
        }
        .btn-producto .precio {
            color: #f97316;
            font-weight: 700;
            font-size: 14px;
            margin-top: 4px;
        }
        .btn-producto:active .precio {
            color: white;
        }
        .search-input {
            width: 100%;
            height: 48px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 0 16px 0 44px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .search-input:focus {
            outline: none;
            border-color: #f97316;
            background: white;
        }
        .carrito-panel {
            background: linear-gradient(145deg, #fff7ed 0%, #ffedd5 100%);
            border: 2px dashed #fdba74;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        .venta-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .btn-cantidad {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #fee2e2;
            color: #ef4444;
            border: none;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(239, 68, 68, 0.2);
        }
        .btn-cantidad:active {
            transform: scale(0.95);
        }
        .btn-action {
            height: 48px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: rgba(0,0,0,0.1);
        }
        .btn-action:active {
            transform: scale(0.98);
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-gray {
            background: #94a3b8;
            color: white;
        }
        .btn-dark {
            background: #1f2937;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .stat-card .label {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 24px;
            font-weight: 800;
            margin-top: 4px;
        }
        .input-field {
            width: 100%;
            height: 48px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .input-field:focus {
            outline: none;
            border-color: #f97316;
        }
        select.input-field {
            padding-right: 40px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            display: flex;
            gap: 12px;
            z-index: 50;
        }
        .bottom-nav .btn-action {
            flex: 1;
        }
        #reporte-invisible { 
            position: absolute; 
            left: -9999px; 
            width: 350px; 
            background: white; 
            padding: 25px; 
            color: black; 
            font-family: 'Courier New', Courier, monospace; 
            border: 1px solid #eee; 
        }
        .border-dashed-t { 
            border-top: 1px dashed #000; 
            margin: 8px 0; 
        }
        .text-factura { 
            font-size: 11px; 
            line-height: 1.4; 
        }
        .scroll-container {
            max-height: 300px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-height: 260px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>

</head>
<body>
    <!-- Header Tasa -->
    <div class="header-tasa">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-white/70 text-xs font-bold uppercase">Tasa del Día</p>
                    <div class="flex items-center gap-2">
                        <span class="text-white font-bold">Bs/USD:</span>
                        <input type="number" id="tasa" value="0.00" step="0.01" class="tasa-input" oninput="actualizarTotalesCarrito()">
                    </div>
                </div>
            </div>
            <div class="flex flex-col items-end gap-2">
                <p id="fechaActual" class="text-white/80 text-xs font-mono bg-white/10 px-2 py-1 rounded"></p>
                <button onclick="cerrarSesion()" class="bg-white/20 p-2 rounded-lg" title="Cerrar sesión">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Panel Ventas -->
    <div class="card">
        <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            Selección de Productos
        </div>

        <!-- Buscador -->
        <div class="relative mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="buscador" placeholder="Buscar producto..." class="search-input" oninput="renderizarMenu()">
        </div>

        <!-- Grid Productos -->
        <div id="grid-menu" class="grid-menu"></div>

        <!-- Carrito -->
        <div id="seccion-carrito" class="carrito-panel hidden">
            <div class="flex items-center gap-2 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span class="text-sm font-bold text-orange-600 uppercase">Pedido Actual</span>
            </div>
            <div id="lista-carrito" class="mb-4"></div>

            <div class="space-y-3 mb-4">
                <select id="metodo" onchange="toggleCamposCredito()" class="input-field">
                    <option value="Efectivo">💵 Efectivo</option>
                    <option value="Electrónico">📱 Electrónico</option>
                    <option value="Crédito">💳 Crédito</option>
                </select>

                <div id="datos-credito" class="hidden space-y-2">
                    <input type="text" id="cliente-nombre" placeholder="Nombre del cliente" class="input-field">
                    <input type="tel" id="cliente-telf" placeholder="Número de teléfono" class="input-field">
                </div>

                <div class="flex justify-between items-center bg-white p-3 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">Total:</span>
                    <div class="text-right">
                        <p id="carritoBs" class="text-xl font-black text-emerald-600">0.00 Bs</p>
                        <p id="carritoUsd" class="text-sm font-bold text-blue-500">$0.00</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="cancelarCarrito()" class="btn-action btn-gray">Cancelar</button>
                <button onclick="registrarVentaFinal()" class="btn-action btn-success">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Estadísticas -->
    <div class="grid grid-cols-2 gap-3 mx-4">
        <div class="stat-card">
            <p class="label">Total Hoy (Bs)</p>
            <p id="totalBs" class="value text-emerald-600">0.00</p>
        </div>
        <div class="stat-card">
            <p class="label">Total Hoy (USD)</p>
            <p id="totalUsd" class="value text-sky-600">0.00</p>
        </div>
    </div>

    <!-- Botón Cierre -->
    <div class="mx-4 mt-4" style="margin-bottom: 100px;">
        <button onclick="generarCierre()" class="btn-action btn-dark w-full flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Generar Cierre del Día
        </button>
    </div>

    <!-- Historial -->
    <div class="card" style="margin-bottom: 100px;">
        <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Historial de Ventas
        </div>
        <div id="listaVentas" class="scroll-container"></div>
    </div>

    <div id="reporte-invisible">
        <div style="text-align: center;">
            <h2 style="font-weight: bold; font-size: 16px; margin: 0; letter-spacing: 2px;">SISTEMA DE VENTAS MÓVIL</h2>
            <p style="font-size: 10px; margin: 2px 0;">REPORTE DE CIERRE DIARIO</p>
            <p id="rep-fecha" style="font-size: 11px; margin: 5px 0;"></p>
        </div>
        <div class="border-dashed-t"></div>
        <div class="text-factura">
            <p><b>TASA:</b> <span id="rep-tasa"></span> Bs/$</p>
        </div>
        <div class="border-dashed-t"></div>

        <table style="width: 100%; font-size: 10px; text-align: left; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid #000;">
                    <th style="padding-bottom: 5px;">CANT/PRODUCTO</th>
                    <th style="text-align: right; padding-bottom: 5px;">TOTAL USD</th>
                </tr>
            </thead>
            <tbody id="rep-tabla-cuerpo"></tbody>
        </table>

        <div class="border-dashed-t"></div>
        <div id="rep-detalles-pagos" class="text-factura"></div>
        <div class="border-dashed-t"></div>

        <div id="rep-seccion-creditos" class="text-factura"></div>

        <div style="text-align: right; margin-top: 10px;">
            <p style="font-size: 13px; font-weight: bold; margin: 0;">TOTAL GENERAL:</p>
            <p id="rep-total-bs" style="font-size: 20px; font-weight: 900; margin: 0;"></p>
            <p id="rep-total-usd" style="font-size: 15px; font-weight: bold; margin: 0;"></p>
        </div>
        <div class="border-dashed-t"></div>
        <p style="text-align: center; font-size: 8px; margin-top: 10px;">*** REPORTE GENERADO POR SISTEMA ***</p>
    </div>

    <script>
        let ventas = JSON.parse(localStorage.getItem('ventas_comida')) || [];

        let menu = JSON.parse(localStorage.getItem('menu_comida')) || [];

        let carrito = [];

        window.addEventListener('storage', (e) => {
            if (e.key === 'menu_comida') {
                menu = JSON.parse(e.newValue);
                renderizarMenu();
            }
            if (e.key === 'tasa_bcv') {
                document.getElementById('tasa').value = e.newValue;
                actualizarTotalesCarrito();
            }
        });

        document.getElementById('fechaActual').innerText = new Date().toLocaleDateString();
        if(localStorage.getItem('tasa_bcv')) document.getElementById('tasa').value = localStorage.getItem('tasa_bcv');

        function renderizarMenu() {
            const grid = document.getElementById('grid-menu');
            const filtro = document.getElementById('buscador').value.toLowerCase();
            grid.innerHTML = "";

            const productosFiltrados = menu.filter(p => p.nombre.toLowerCase().includes(filtro));

            if(productosFiltrados.length === 0) {
                grid.innerHTML = `<p class="col-span-2 text-center text-gray-400 py-8 text-sm">No se encontraron productos</p>`;
                return;
            }

            productosFiltrados.forEach((prod) => {
                const btn = document.createElement('div');
                btn.className = "btn-producto";
                btn.onclick = () => agregarAlCarrito(prod.nombre, prod.precio);
                btn.innerHTML = `
                    <span class="font-bold text-sm uppercase">${prod.nombre}</span>
                    <span class="precio">$${prod.precio.toFixed(2)}</span>
                `;
                grid.appendChild(btn);
            });
        }

        function toggleCamposCredito() {
            const metodo = document.getElementById('metodo').value;
            const divCredito = document.getElementById('datos-credito');
            if(metodo === "Crédito") divCredito.classList.remove('hidden');
            else divCredito.classList.add('hidden');
        }

        function agregarAlCarrito(nombre, precio) {
            const item = carrito.find(i => i.nombre === nombre);
            if (item) item.cant++;
            else carrito.push({ nombre, precio, cant: 1 });
            renderizarCarrito();
        }

        function renderizarCarrito() {
            const seccion = document.getElementById('seccion-carrito');
            const lista = document.getElementById('lista-carrito');
            if (carrito.length === 0) { seccion.classList.add('hidden'); return; }
            seccion.classList.remove('hidden');
            lista.innerHTML = "";
            carrito.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "venta-item";
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="bg-orange-100 text-orange-700 px-2 py-1 rounded font-bold text-sm">${item.cant}x</span>
                        <span class="font-medium text-gray-700">${item.nombre}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-orange-600">$${(item.precio * item.cant).toFixed(2)}</span>
                        <button onclick="quitarUno(${index})" class="btn-cantidad">−</button>
                    </div>
                `;
                lista.appendChild(row);
            });
            actualizarTotalesCarrito();
        }

        function quitarUno(index) {
            if (carrito[index].cant > 1) carrito[index].cant--;
            else carrito.splice(index, 1);
            renderizarCarrito();
        }

        function actualizarTotalesCarrito() {
            const tasa = parseFloat(document.getElementById('tasa').value) || 0;
            const subUsd = carrito.reduce((acc, item) => acc + (item.precio * item.cant), 0);
            document.getElementById('carritoBs').innerText = (subUsd * tasa).toFixed(2) + " Bs";
            document.getElementById('carritoUsd').innerText = "$" + subUsd.toFixed(2);
            localStorage.setItem('tasa_bcv', tasa);
        }

        function cancelarCarrito() { 
            carrito = []; 
            document.getElementById('metodo').value = "Efectivo";
            document.getElementById('datos-credito').classList.add('hidden'); 
            renderizarCarrito(); 
        }

        function registrarVentaFinal() {
            if (carrito.length === 0) return;
            const metodo = document.getElementById('metodo').value;
            let cliente = "";
            let telf = "";

            if(metodo === "Crédito") {
                cliente = document.getElementById('cliente-nombre').value.trim();
                telf = document.getElementById('cliente-telf').value.trim();
                if(!cliente || !telf) return alert("Para créditos debes ingresar Nombre y Teléfono.");
            }

            const tasa = parseFloat(document.getElementById('tasa').value) || 0;
            const totalUsd = carrito.reduce((acc, item) => acc + (item.precio * item.cant), 0);
            const descrip = carrito.map(i => `${i.cant}x ${i.nombre}`).join(", ");

            ventas.push({
                id: Date.now(),
                desc: descrip,
                metodo: metodo,
                cliente: cliente,
                telf: telf,
                bs: totalUsd * tasa,
                usd: totalUsd
            });

            carrito = [];
            document.getElementById('cliente-nombre').value = "";
            document.getElementById('cliente-telf').value = "";
            document.getElementById('metodo').value = "Efectivo";
            document.getElementById('datos-credito').classList.add('hidden');

            guardarYActualizar();
            renderizarCarrito();
        }

        function guardarYActualizar() {
            localStorage.setItem('ventas_comida', JSON.stringify(ventas));
            actualizarTodo();
        }

        function actualizarTodo() {
            let tBs = 0; let tUsd = 0;
            const lista = document.getElementById('listaVentas');
            lista.innerHTML = "";
            [...ventas].reverse().forEach(v => {
                tBs += v.bs; tUsd += v.usd;
                const infoCliente = v.cliente ? `<p class="text-xs text-blue-600 font-bold mt-1">Deuda: ${v.cliente} (${v.telf})</p>` : "";
                const item = document.createElement('div');
                item.className = "venta-item";
                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-gray-800">${v.desc}</p>
                        <p class="text-xs text-gray-400 uppercase">${v.metodo}</p>
                        ${infoCliente}
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-emerald-600">${v.bs.toFixed(2)} Bs</p>
                        <p class="text-xs text-sky-500">$${v.usd.toFixed(2)}</p>
                    </div>
                `;
                lista.appendChild(item);
            });
            document.getElementById('totalBs').innerText = tBs.toFixed(2);
            document.getElementById('totalUsd').innerText = tUsd.toFixed(2);
        }

        function cerrarSesion() {
            firebase.auth().signOut().then(() => {
                // Al cerrar sesión, el onAuthStateChanged detectará que ya no hay usuario
                // y automáticamente los enviará a la pantalla de login.
            }).catch((error) => {
                console.error("Error al cerrar sesión", error);
            });
        }

        async function generarCierre() {
            if (ventas.length === 0) return alert("No hay ventas registradas.");
            const tasa = parseFloat(document.getElementById('tasa').value) || 0;

            document.getElementById('rep-fecha').innerText = new Date().toLocaleString();
            document.getElementById('rep-tasa').innerText = tasa.toFixed(2);

            const resumenItems = {};
            let efeBs = 0, eleBs = 0, creBs = 0;
            let listadoCreditos = "";

            ventas.forEach(v => {
                if (v.metodo === "Efectivo") efeBs += v.bs;
                else if (v.metodo === "Electrónico") eleBs += v.bs;
                else if (v.metodo === "Crédito") {
                    creBs += v.bs;
                    listadoCreditos += `<div style="margin-bottom:4px;">• ${v.cliente} (${v.telf}): ${v.bs.toFixed(2)}Bs</div>`;
                }

                v.desc.split(", ").forEach(p => {
                    const match = p.match(/(\d+)x\s(.+)/);
                    if (match) {
                        const cantSource = parseInt(match[1]);
                        const nombre = match[2];
                        if (!resumenItems[nombre]) resumenItems[nombre] = { cant: 0, usd: 0 };
                        resumenItems[nombre].cant += cantSource;
                        const pMenu = menu.find(m => m.nombre === nombre);
                        resumenItems[nombre].usd += (cantSource * (pMenu ? pMenu.precio : 0));
                    }
                });
            });

            const tabla = document.getElementById('rep-tabla-cuerpo');
            tabla.innerHTML = "";
            for (const [nom, dat] of Object.entries(resumenItems)) {
                tabla.innerHTML += `<tr><td style="padding:3px 0;">${dat.cant}x ${nom.toUpperCase()}</td><td style="text-align:right;">${dat.usd.toFixed(2)}$</td></tr>`;
            }

            document.getElementById('rep-detalles-pagos').innerHTML = `
                <div style="display:flex; justify-content:space-between;"><span>EFECTIVO:</span><span>${efeBs.toFixed(2)} Bs</span></div>
                <div style="display:flex; justify-content:space-between;"><span>ELECTRÓNICO:</span><span>${eleBs.toFixed(2)} Bs</span></div>
                <div style="display:flex; justify-content:space-between;"><span>CRÉDITO TOTAL:</span><span>${creBs.toFixed(2)} Bs</span></div>
            `;

            if(creBs > 0) {
                document.getElementById('rep-seccion-creditos').innerHTML = `<b>DETALLE DE CRÉDITOS:</b><br>${listadoCreditos}`;
            } else {
                document.getElementById('rep-seccion-creditos').innerHTML = "";
            }

            document.getElementById('rep-total-bs').innerText = document.getElementById('totalBs').innerText + " Bs";
            document.getElementById('rep-total-usd').innerText = "$" + document.getElementById('totalUsd').innerText;

            const reporte = document.getElementById('reporte-invisible');
            html2canvas(reporte, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Cierre_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        renderizarMenu();
        actualizarTodo();
    </script>
</body>
</html>
